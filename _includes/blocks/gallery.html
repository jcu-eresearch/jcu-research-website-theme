{% assign block_background = include.block.background | default: "none" %}
{% assign block_background_mode = include.block.background_mode | default: "block" %}

<section class="content-block content-block--bg-{{ block_background }} content-block--bg-{{ block_background_mode }}">
  {% if include.block.title %}
    <h2>{{ include.block.title }}</h2>
  {% endif %}
  <div class="image-gallery">
    {% for item in include.block.items %}
      <a class="gallery-item" href="{{ item.url | relative_url }}">
        <img src="{{ item.image | relative_url }}" alt="">
        <span>{{ item.title }}</span>
      </a>
    {% endfor %}
  </div>
</section>
