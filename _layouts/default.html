<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    {% unless site.theme_settings.favicon == false %}
      {% assign favicon = site.theme_settings.favicon | default: "/assets/images/favicon.svg" %}
      <link rel="icon" href="{{ favicon | relative_url }}">
    {% endunless %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body class="layout-{{ page.layout | default: 'page' }}">
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="site-shell">
      {% include sidebar.html %}
      <main class="site-main" id="main">
        {{ content }}
      </main>
    </div>
    <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  </body>
</html>
